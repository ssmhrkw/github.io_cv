<script>
// --- 定数 ---
const BANDS = [63, 125, 250, 500];
const LF_RMS = {63:33.0, 125:20.0, 250:15.0, 500:7.0};
const DELTA_C = {63:9.8, 125:8.3, 250:6.5, 500:5.6};
const Z_DROP_CHARS = {
  "31.5": {63:-15, 125:-12, 250:-9, 500:-6},
  "63":   {63:-12, 125:-9,  250:-6, 500:-3},
  "125":  {63:-9,  125:-6,  250:-3, 500:0}
};
const L_BASE_50 = {63: 88, 125: 76, 250: 69, 500: 62};

// --- 計算関数 ---

// Lyon-Maidanik Formula
function calcSigma(f, fc, S, U) {
  const c = 340.0;
  if (f >= fc) {
    return 1.0; 
  } else {
    // サブクリティカル域: Edge radiation
    const val = (U * c) / (Math.pow(Math.PI, 2) * S * Math.sqrt(f * fc));
    return Math.min(val, 1.0); // k>1 は 1.0 にクリップ
  }
}

// Method 2 (Eq 2.10 / 2.11)
function calcPolyDeltaL(r, type) {
  if (r < 0 || type === 'none') return 0;
  let dL = 0;
  if (type === 'obari') { 
    dL = 15.37 - 68.86*r + 98.65*(r*r) - 45.36*(r*r*r);
    if (r > 0.6) dL = 0;
  } else if (type === 'kobari') { 
    dL = 10.93 - 55.86*r + 92.57*(r*r) - 49.72*(r*r*r);
    if (r > 0.5) dL = 0;
  }
  return Math.max(0, dL);
}

// 複合スラブ特性取得
function getCompositeProps() {
  const isComp = document.getElementById('isComposite').checked;
  const h1 = parseFloat(document.getElementById('h_mm').value) / 1000;
  const rho1 = parseFloat(document.getElementById('rho').value);
  const E1 = parseFloat(document.getElementById('E10').value) * 1e10;
  
  if (!isComp) return { h: h1, rho: rho1, E: E1 };
  
  // 複合スラブの隠しパラメータを使用する場合
  const h2 = parseFloat(document.getElementById('h2').value) / 1000;
  const rho2 = parseFloat(document.getElementById('rho2').value);
  const E2 = parseFloat(document.getElementById('E2_e10').value) * 1e10;
  
  const rho_eq = (rho1 * h1 + rho2 * h2) / (h1 + h2);
  const h_eq = h1 + h2 * (rho2 / rho1);
  const Ht = h1 + h2;
  const I_geom = Math.pow(Ht, 3) / 12;
  const I1 = Math.pow(h1, 3)/12 + h1 * Math.pow(h2/2, 2);
  const I2 = Math.pow(h2, 3)/12 + h2 * Math.pow(h1/2, 2);
  const E_eq = (E1 * I1 + E2 * I2) / I_geom;
  return { h: h_eq, rho: rho_eq, E: E_eq };
}

function determineGrade(spectrum) {
  for (let grade = 30; grade <= 80; grade += 5) {
    let satisfied = true;
    const diff = grade - 50; 
    for (const f of BANDS) {
      if (spectrum[f] > L_BASE_50[f] + diff) {
        satisfied = false; break;
      }
    }
    if (satisfied) return { label: `LH-${grade}`, val: grade };
  }
  return { label: `LH-80超`, val: 85 };
}

// --- メイン計算処理 ---
function calculate() {
  try {
    const roomLx = parseFloat(document.getElementById('a_mm').value) / 1000;
    const roomLy = parseFloat(document.getElementById('b_mm').value) / 1000;
    const isSame = document.getElementById('sameArea').checked;
    const slabLx = isSame ? roomLx : parseFloat(document.getElementById('slabLx_mm').value) / 1000;
    const slabLy = isSame ? roomLy : parseFloat(document.getElementById('slabLy_mm').value) / 1000;
    // Ex9などで使用するオフセット（現在は隠し要素的扱いだが計算に使用）
    const offX_mm = document.getElementById('off_X_mm') ? parseFloat(document.getElementById('off_X_mm').value) : 0;
    const offY_mm = document.getElementById('off_Y_mm') ? parseFloat(document.getElementById('off_Y_mm').value) : 0;
    const offX = offX_mm / 1000;
    const offY = offY_mm / 1000;

    const H = parseFloat(document.getElementById('room_H').value);
    const T = parseFloat(document.getElementById('room_T').value);
    const f_theta = 25; 

    const props = getCompositeProps();
    const { h, rho, E } = props;
    const h_mm = h * 1000;

    // 1. Z0, f0
    const Z0 = (4 / Math.sqrt(3)) * Math.sqrt(rho * E) * (h * h);
    const Lz0 = 20 * Math.log10(Z0);
    
    const cl = Math.sqrt(E/rho);
    const termGeo = (2.25 / (slabLx**2)) + (1.4 / (slabLy**2));
    const f0_fix = (Math.PI / (4 * Math.sqrt(3))) * termGeo * cl * h;
    const f0 = 0.8 * f0_fix;
    
    // 2. コインシデンス周波数 fc (Lyon-Maidanik用)
    const c_air = 340.0;
    const termMat = Math.sqrt((12 * rho * (1 - 0.04)) / E);
    const fc = (Math.pow(c_air, 2) / (2 * Math.PI * h)) * termMat;

    let domBand = "125";
    if (f0 < 44.7) domBand = "31.5";
    else if (f0 < 89.1) domBand = "63";
    const zDropMap = Z_DROP_CHARS[domBand] || Z_DROP_CHARS["125"];

    // 3. 吸音力 A
    let tenLogA = 0;
    if(document.getElementById('forceA').checked) {
      const A_fixed = (Math.abs(roomLx-4.9)<0.1) ? 18.5 : 14.9; 
      tenLogA = 10 * Math.log10(A_fixed);
    } else {
      const Vol = roomLx * roomLy * H;
      const A_calc = (0.161 * Vol) / T;
      tenLogA = 10 * Math.log10(Math.max(A_calc, 0.1));
    }

    // 4. 各点計算
    const lam_theta = Math.sqrt((Math.PI * cl * h) / (Math.sqrt(3) * f_theta));
    const pts = [];
    let sumEnergy = {};
    BANDS.forEach(f => sumEnergy[f] = 0);

    // 放射パラメータ (部屋全体)
    const S_room = roomLx * roomLy;
    const U_room = 2 * (roomLx + roomLy);
    const bounds = {
      top: document.getElementById('bound_top').value,
      btm: document.getElementById('bound_btm').value,
      left: document.getElementById('bound_left').value,
      right: document.getElementById('bound_right').value
    };

    for(let i=1; i<=5; i++){
      const ptEl = document.getElementById(`pt${i}`);
      if(!ptEl.querySelector('.on').checked) continue;
      
      const x = parseFloat(ptEl.querySelector('.x').value) / 1000;
      const y = parseFloat(ptEl.querySelector('.y').value) / 1000;
      const typeX = ptEl.querySelector('.ex').value;
      const typeY = ptEl.querySelector('.ey').value;

      // 拘束距離 (部屋内座標 x,y を使用)
      const dx = Math.min(x, roomLx - x);
      const dy = Math.min(y, roomLy - y);
      
      // Method 2 (Eq 2.13)
      const dLx = calcPolyDeltaL(dx / lam_theta, typeX);
      const dLy = calcPolyDeltaL(dy / lam_theta, typeY);
      const dLz = dLx + dLy; 

      const spectrum = {};
      const LzTheta_vals = {}; 
      const LzB_vals = {}; 

      BANDS.forEach(f => {
        const zDrop = zDropMap[f];
        const LzT = Lz0 + dLz + zDrop;
        
        // Seff calculation (Method 2: 部屋の周辺条件による低減)
        const lam_f = Math.sqrt((Math.PI * cl * h) / (Math.sqrt(3) * f));
        let Lx_eff = roomLx;
        let Ly_eff = roomLy;
        if (bounds.left !== 'none') Lx_eff -= lam_f/4;
        if (bounds.right !== 'none') Lx_eff -= lam_f/4;
        if (bounds.top !== 'none') Ly_eff -= lam_f/4;
        if (bounds.btm !== 'none') Ly_eff -= lam_f/4;
        
        const Seff = Math.max(0.1, Lx_eff) * Math.max(0.1, Ly_eff);
        const tenLogSe = 10 * Math.log10(Seff);

        // Lyon-Maidanik Calculation (Dynamic k)
        const sigma = calcSigma(f, fc, S_room, U_room);
        const tenLogK = 10 * Math.log10(sigma);

        const dC = DELTA_C[f];
        const LF = LF_RMS[f];
        const L_val = LF - LzT + tenLogSe + tenLogK - tenLogA + dC + 152;
        
        spectrum[f] = L_val;
        LzTheta_vals[f] = Lz0 + dLz;
        LzB_vals[f] = LzT;
        sumEnergy[f] += Math.pow(10, L_val/10);
      });
      pts.push({id: i, dLz, spectrum, LzTheta: LzTheta_vals, LzB: LzB_vals});
    }

    const avg = {};
    BANDS.forEach(f => avg[f] = 10 * Math.log10(sumEnergy[f] / pts.length));
    
    renderTable(pts, avg, Lz0, f0, fc, tenLogA, h, cl, S_room, U_room);

  } catch(e) {
    alert("計算エラーが発生しました。入力値を確認してください。\n" + e.message);
    console.error(e);
  }
}

function renderTable(pts, avg, Lz0, f0, fc, tenLogA, h, cl, S, U) {
  document.getElementById('out').classList.remove('hidden');
  document.getElementById('res_Lz0').innerText = Lz0.toFixed(1) + " dB";
  document.getElementById('res_f0').innerText = f0.toFixed(1) + " Hz";
  document.getElementById('res_fc').innerText = fc.toFixed(1) + " Hz";
  document.getElementById('phys_memo').innerText = `h=${h.toFixed(3)}m, cl=${cl.toFixed(0)}m/s, A=${Math.pow(10,tenLogA/10).toFixed(1)}m²`;
  
  const grade = determineGrade(avg);
  const badge = document.getElementById('gradeBadge');
  badge.innerText = grade.label;
  badge.className = 'badge ' + (grade.val <= 45 ? 'badge-good' : (grade.val <= 55 ? 'badge-mid' : 'badge-bad'));
  document.getElementById('lnum').innerText = `L-${grade.val} 相当`;

  const tbody = document.getElementById('tableBody');
  let html = '';
  const addRow = (label, dataFn, cls='', unit='') => {
    html += `<tr class="${cls}"><td class="row-header">${label}</td><td class="text-center text-xs text-gray-500">${unit}</td>`;
    BANDS.forEach(f => html += `<td>${typeof dataFn === 'function' ? dataFn(f).toFixed(1) : dataFn}</td>`);
    html += `</tr>`;
  };

  addRow("(1) 衝撃力レベル 20logF", f => LF_RMS[f], '', 'dB');
  pts.forEach(p => addRow(`(2) 20log Zθ (S${p.id})`, f => p.LzTheta[f], 'sub-row', 'dB'));
  const domBand = (f0 >= 44.7 && f0 < 89.1) ? "63" : ((f0 < 44.7) ? "31.5" : "125");
  addRow("(3) インピーダンス周波数特性", f => Z_DROP_CHARS[domBand][f], '', 'dB');
  pts.forEach(p => addRow(`(4) 20log Zb (S${p.id})`, f => p.LzB[f], 'sub-row', 'dB'));
  addRow("(5) 曲げ波の波長 λb", f => Math.sqrt((Math.PI * cl * h) / (Math.sqrt(3) * f)), '', 'm');
  
  // Seff (Display reference for 4-side rigid condition for simplicity)
  addRow("(6) 有効放射面積 Seff (参考)", f => {
     const lam = Math.sqrt((Math.PI * cl * h) / (Math.sqrt(3) * f));
     const Lx = parseFloat(document.getElementById('a_mm').value)/1000 - lam/2;
     const Ly = parseFloat(document.getElementById('b_mm').value)/1000 - lam/2;
     return Math.max(0, Lx*Ly);
  }, '', 'm²');

  addRow("(7) 10log Seff (参考)", f => {
     const lam = Math.sqrt((Math.PI * cl * h) / (Math.sqrt(3) * f));
     const Lx = parseFloat(document.getElementById('a_mm').value)/1000 - lam/2;
     const Ly = parseFloat(document.getElementById('b_mm').value)/1000 - lam/2;
     return 10*Math.log10(Math.max(1e-5, Lx*Ly));
  }, '', 'dB');

  // (8) 10log k (Dynamic Calculation)
  addRow("(8) 音響放射係数 10log k", f => 10 * Math.log10(calcSigma(f, fc, S, U)), 'font-bold text-indigo-700 bg-indigo-50', 'dB');
  
  addRow("(10) 室吸音力 10log A", f => tenLogA, '', 'dB');
  addRow("(11) 時定数補正 ΔC", f => DELTA_C[f], '', 'dB');
  pts.forEach(p => addRow(`(12) L (S${p.id})`, f => p.spectrum[f], 'sub-row', 'dB'));
  addRow("平均床衝撃音レベル LH", f => avg[f], 'highlight', 'dB');
  
  tbody.innerHTML = html;
}

// UI Setup
function setupPoints() {
  const t = document.getElementById('ptTemplate').content;
  for(let i=1; i<=5; i++){
    const clone = t.cloneNode(true);
    clone.querySelector('.ptLabel').innerText = `S${i}`;
    document.getElementById(`pt${i}`).appendChild(clone);
  }
}

document.getElementById('fill5').addEventListener('click', () => {
  const Lx = parseFloat(document.getElementById('a_mm').value);
  const Ly = parseFloat(document.getElementById('b_mm').value);
  const coords = [
    {x: Lx*0.25, y: Ly*0.25}, {x: Lx*0.50, y: Ly*0.50}, {x: Lx*0.75, y: Ly*0.75},
    {x: Lx*0.75, y: Ly*0.25}, {x: Lx*0.25, y: Ly*0.75}
  ];
  coords.forEach((c, i) => {
    const pt = document.getElementById(`pt${i+1}`);
    pt.querySelector('.x').value = c.x.toFixed(0);
    pt.querySelector('.y').value = c.y.toFixed(0);
    pt.querySelector('.ex').value = 'obari';
    pt.querySelector('.ey').value = 'obari';
  });
});

function loadExample(num) {
  const setVal = (id, v) => document.getElementById(id).value = v;
  if(num===7){
    document.getElementById('isComposite').checked=false;
    document.getElementById('sameArea').checked=true; document.getElementById('slabInputArea').classList.add('hidden');
    setVal('a_mm', 4900); setVal('b_mm', 4730);
    setVal('h_mm', 160); setVal('rho', 2300); setVal('E10', 2.6);
    document.getElementById('forceA').checked=true;
    document.getElementById('fill5').click();
  }
  if(num===8){
    document.getElementById('isComposite').checked=true;
    setVal('h_mm', 150); setVal('h2', 60); setVal('rho2', 1700); setVal('E2_e10', 1.5);
    document.getElementById('sameArea').checked=false; document.getElementById('slabInputArea').classList.remove('hidden');
    setVal('slabLx_mm', 6600); setVal('slabLy_mm', 4600);
    setVal('a_mm', 3300); setVal('b_mm', 4600);
    document.getElementById('forceA').checked=true;
    document.getElementById('fill5').click();
    for(let i=1;i<=5;i++){
        const x = parseFloat(document.querySelector(`#pt${i} .x`).value);
        if(x > 1650) document.querySelector(`#pt${i} .ex`).value = 'none';
        else document.querySelector(`#pt${i} .ex`).value = 'obari';
    }
  }
  if(num===9){
    document.getElementById('isComposite').checked=false;
    document.getElementById('sameArea').checked=false; document.getElementById('slabInputArea').classList.remove('hidden');
    setVal('slabLx_mm', 5100); setVal('slabLy_mm', 5500);
    setVal('a_mm', 2800); setVal('b_mm', 3780);
    setVal('h_mm', 150); setVal('rho', 2300); setVal('E10', 2.1);
    document.getElementById('forceA').checked=false;
    document.getElementById('fill5').click();
    // Ex9 (Room in Slab) Bounds setup
    document.getElementById('bound_top').value = 'rigid';
    document.getElementById('bound_left').value = 'rigid';
    document.getElementById('bound_btm').value = 'none';
    document.getElementById('bound_right').value = 'none';
    for(let i=1;i<=5;i++){ document.querySelector(`#pt${i} .ex`).value = 'obari'; }
  }
  document.getElementById('run').click();
}

document.getElementById('sameArea').addEventListener('change', (e) => {
  const area = document.getElementById('slabInputArea');
  if(e.target.checked) area.classList.add('hidden');
  else area.classList.remove('hidden');
});

document.getElementById('run').addEventListener('click', calculate);

setupPoints();
document.getElementById('fill5').click();
</script>
