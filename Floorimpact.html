<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>床衝撃音レベル予測（v1.4 吸音力自動・離散ロジック版）</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');
  body{font-family:'Inter','Noto Sans JP',sans-serif;background:#f0f2f5;color:#1f2937}
  .card{background:#fff;border-radius:0.75rem;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
  .input-grp label{font-size:0.75rem;font-weight:600;color:#4b5563;display:block;margin-bottom:0.25rem}
  .input-grp input{width:100%;padding:0.5rem;border:1px solid #d1d5db;border-radius:0.375rem;font-size:0.875rem}
  .cell{text-align:center;padding:0.5rem 0.25rem;border:1px solid #e5e7eb;font-size:0.75rem;white-space:nowrap;font-weight:600}
  
  /* ヒートマップ色定義 */
  .bg-grade-spec { background-color: #dbeafe; color: #1e40af; } /* L-40特 */
  .bg-grade-40   { background-color: #eff6ff; color: #1d4ed8; } /* L-40 */
  .bg-grade-45   { background-color: #d1fae5; color: #065f46; } /* L-45 */
  .bg-grade-50   { background-color: #fef08a; color: #854d0e; } /* L-50 */
  .bg-grade-55   { background-color: #fed7aa; color: #9a3412; } /* L-55 */
  .bg-grade-60   { background-color: #fecaca; color: #991b1b; } /* L-60 */
  .bg-grade-bad  { background-color: #fca5a5; color: #7f1d1d; } /* L-65以上 */
  
  .tab-btn.active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight:bold; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  
  .sticky-col { position: sticky; left: 0; z-index: 10; border-right: 2px solid #e5e7eb; }
</style>
</head>
<body class="p-2 sm:p-6">

<div class="max-w-[95%] mx-auto">
  <div class="mb-6 flex justify-between items-end">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">床衝撃音予測 マトリクス分析 v1.4</h1>
      <p class="text-sm text-gray-500">
        スラブ面積（正方形仮定）× 厚さによるL等級マップ<br>
        <span class="text-blue-600 text-xs">※吸音力Aは室容積と残響時間から自動計算 (Sabine則)</span><br>
        <span class="text-gray-400 text-xs">※厚さ補正k値等は元の離散値を採用</span>
      </p>
    </div>
  </div>

  <div class="card p-4 mb-6">
    <div class="grid grid-cols-2 md:grid-cols-6 gap-4">
      <div class="input-grp">
        <label>密度 ρ [kg/m³]</label>
        <input id="rho" type="number" value="2300">
      </div>
      <div class="input-grp">
        <label>ヤング率 E [N/m² ×10¹⁰]</label>
        <input id="E10" type="number" step="0.1" value="2.1">
      </div>
      
      <div class="input-grp">
        <label>天井高さ H [m]</label>
        <input id="H_m" type="number" step="0.1" value="2.5">
      </div>
      <div class="input-grp">
        <label>残響時間 T [s]</label>
        <input id="T_sec" type="number" step="0.1" value="0.5">
      </div>
      
      <div class="input-grp">
        <label>衝撃周波数 fθ [Hz]</label>
        <input id="f_theta" type="number" value="25">
      </div>
      <div class="input-grp flex items-end">
        <button id="runBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
          再計算
        </button>
      </div>
    </div>
  </div>

  <div id="resultArea" class="card p-4 hidden">
    
    <div class="flex border-b border-gray-200 mb-4">
      <button class="tab-btn active px-4 py-2 text-sm text-gray-600 focus:outline-none" onclick="switchTab('obari')">① 4周大ばり (剛)</button>
      <button class="tab-btn px-4 py-2 text-sm text-gray-600 focus:outline-none" onclick="switchTab('none')">② 4周梁なし (柔)</button>
    </div>

    <div id="tab-obari" class="tab-content active overflow-x-auto">
      <h3 class="text-sm font-bold text-gray-700 mb-2">拘束条件：4辺大ばり支持</h3>
      <div id="tableContainerObari"></div>
    </div>

    <div id="tab-none" class="tab-content overflow-x-auto">
      <h3 class="text-sm font-bold text-gray-700 mb-2">拘束条件：4辺梁なし（単純支持相当）</h3>
      <div id="tableContainerNone"></div>
    </div>

    <div class="mt-4 text-xs text-gray-500 bg-gray-50 p-2 rounded">
      <strong>計算ロジック:</strong><br>
      ・<strong>吸音力 A:</strong> $A = 0.161 \times (面積 \times 高さ) / 残響時間$ にてセルごとに算出。<br>
      ・<strong>形状:</strong> $L_x = L_y = \sqrt{面積}$ の正方形。<br>
      ・<strong>k値補正:</strong> 線形補間を行わず、最も近い基準値（120, 150...）を採用。
    </div>
  </div>
</div>

<script>
// --- 定数・辞書データ ---
const BANDS = [63, 125, 250, 500];
const FRMS = {63:32, 125:20, 250:13, 500:4};
const DL_PEAK = 8;

// L等級曲線
const L_CURVE = {
  'L-40': [68, 56, 49, 42],
  'L-45': [73, 61, 54, 47],
  'L-50': [78, 66, 59, 52],
  'L-55': [83, 71, 64, 57],
  'L-60': [88, 76, 69, 62],
  'L-65': [93, 81, 74, 67]
};

// ΔL曲線データ (線形補間用)
const DL_CURVE_DATA = {
  none:   [[0,0], [0.5,0]],
  kobari: [[0.0,10.0],[0.1,7.0],[0.15,5.6],[0.2,4.5],[0.25,3.5],[0.3,2.5],[0.35,1.2],[0.4,0.5],[0.5,0.0]],
  obari:  [[0.0,12.0],[0.1,9.5],[0.15,7.0],[0.2,4.8],[0.23,4.1],[0.25,3.5],[0.3,2.5],[0.35,1.2],[0.4,0.5],[0.5,0.0]]
};

// 10log k の基準データ（離散値取得用）
const K_DB_MAP = {
  120: {63:-7, 125:-2, 250:0, 500:0},
  150: {63:-5, 125:0, 250:0, 500:0},
  180: {63:-4, 125:0, 250:0, 500:0},
  200: {63:-3, 125:0, 250:0, 500:0},
  230: {63:0,  125:0, 250:0, 500:0}
};
// どのキーを参照するか判定するための配列
const K_KEYS = [120, 150, 180, 200, 230];

// マトリクスの軸定義
const THICKNESS_STEPS = [];
for (let h = 120; h <= 300; h += 10) THICKNESS_STEPS.push(h);

const AREA_STEPS = [];
for (let s = 10; s <= 100; s += 5) AREA_STEPS.push(s);

// --- 物理計算関数群 ---

// データテーブルからの線形補間 (ΔL用は補間のまま)
function interpTable(tbl, x) {
  const xmax = tbl[tbl.length-1][0];
  x = Math.max(0, Math.min(x, xmax));
  for(let i=1; i<tbl.length; i++){
    const [x2, y2] = tbl[i];
    const [x1, y1] = tbl[i-1];
    if(x <= x2) return y1 + (y2 - y1) * (x - x1) / (x2 - x1);
  }
  return tbl[tbl.length-1][1];
}

// 厚さ補正 k(dB) の取得（離散値：最も近いキーを探す）
function get_k_dB_discrete(h_mm, f) {
  let bestK = K_KEYS[0];
  let minDiff = 10000;
  for (const k of K_KEYS) {
    const diff = Math.abs(h_mm - k);
    if (diff < minDiff) {
      minDiff = diff;
      bestK = k;
    }
  }
  return K_DB_MAP[bestK][f];
}

function getDominantBand(fn1) {
  if(fn1 >= 22.4 && fn1 < 44.7) return "31.5"; 
  if(fn1 >= 44.7 && fn1 < 89.1) return "63"; 
  return "125";
}

function getRelLZ(bandTag, f) {
  const rel = {
    "31.5": {63:-15, 125:-12, 250:-9, 500:-6},
    "63":   {63:-12, 125:-9,  250:-6, 500:-3},
    "125":  {63:-9,  125:-6,  250:-3, 500:0}
  };
  return rel[bandTag][f];
}

/**
 * 1セル分のL等級を計算する関数
 */
function calculateCellGrade(h_mm, area_m2, boundaryType, params) {
  const { rho, E, H, T, fth } = params;
  const h_m = h_mm / 1000.0;
  
  // 正方形仮定
  const L_span = Math.sqrt(area_m2);
  const a_room = L_span; 
  const b_room = L_span;

  // ★吸音力Aの自動計算 (Sabineの式)
  // A = 0.161 * V / T
  const Volume = area_m2 * H;
  const A_calc = (0.161 * Volume) / T;
  const tenLogA = 10 * Math.log10(Math.max(A_calc, 0.1)); // Aが極端に小さい場合のエラー回避

  // 1. 基準インピーダンス Zr
  const Zr = (4/Math.sqrt(3)) * Math.sqrt(rho) * Math.sqrt(E) * (h_m * h_m);
  const Lzr = 20 * Math.log10(Zr);

  // 2. 一次固有振動数 fn1
  const cl = Math.sqrt(E/rho);
  const term = (2.25/(a_room**2)) + (1.4/(b_room**2)); 
  const ffix = (Math.PI / (4*Math.sqrt(3))) * term * cl * h_m;
  const fn1 = 0.8 * ffix; // 実測補正
  const domBand = getDominantBand(fn1);

  // 3. 共通項
  const commonTerms = {};
  
  for(const f of BANDS) {
    const lam = Math.sqrt(Math.PI * cl * h_m / (Math.sqrt(3) * f));
    const term1 = Math.max(a_room - lam/4, 0);
    const term2 = Math.max(b_room - lam/2, 0); 
    const Seff = term1 * term2;
    const tenLogSe = 10 * Math.log10(Math.max(Seff, 1e-12));
    
    // ★v1.2の補間をやめ、離散値を使用
    const tenLogK = get_k_dB_discrete(h_mm, f);
    
    // L = ... - 10logA ...
    const baseVal = FRMS[f] - getRelLZ(domBand, f) + tenLogSe + tenLogK - tenLogA + DL_PEAK + 152 - Lzr;
    commonTerms[f] = baseVal;
  }

  // 4. 5点でのΔLz計算
  const pts = [
    {r1: 1/3, r2: 1/3}, 
    {r1: 2/3, r2: 1/3},
    {r1: 1/3, r2: 2/3},
    {r1: 2/3, r2: 2/3},
    {r1: 1/2, r2: 1/2} 
  ];
  
  const lam_theta = Math.sqrt(Math.PI * cl * h_m / (Math.sqrt(3) * fth));
  let sumL = {63:0, 125:0, 250:0, 500:0};

  for(const p of pts) {
    const x = p.r1 * a_room;
    const y = p.r2 * b_room;
    const d1 = Math.min(x, a_room - x);
    const d2 = Math.min(y, b_room - y);
    const r1_val = d1 / lam_theta;
    const r2_val = d2 / lam_theta;

    let DL1 = 0, DL2 = 0;
    const curve = (boundaryType === 'obari') ? DL_CURVE_DATA.obari : DL_CURVE_DATA.none;
    
    DL1 = interpTable(curve, r1_val);
    DL2 = interpTable(curve, r2_val);
    const DLz = DL1 + DL2;

    for(const f of BANDS) {
      sumL[f] += (commonTerms[f] - DLz);
    }
  }

  const avgL = {};
  for(const f of BANDS) {
    avgL[f] = sumL[f] / pts.length;
  }

  // 5. 等級判定
  let grade = 'L-65以上';
  const grades = ['L-40', 'L-45', 'L-50', 'L-55', 'L-60', 'L-65'];
  
  for(const g of grades) {
    const curve = L_CURVE[g];
    let ok = true;
    for(let i=0; i<4; i++) {
      if(avgL[BANDS[i]] > curve[i]) {
        ok = false; break;
      }
    }
    if(ok) {
      grade = g;
      if(grade === 'L-40') grade = 'L-40特';
      break;
    }
  }

  return grade;
}

// --- UI制御 ---

function getGradeColorClass(grade) {
  if(grade.includes('L-40特')) return 'bg-grade-spec';
  if(grade === 'L-40') return 'bg-grade-40';
  if(grade === 'L-45') return 'bg-grade-45';
  if(grade === 'L-50') return 'bg-grade-50';
  if(grade === 'L-55') return 'bg-grade-55';
  if(grade === 'L-60') return 'bg-grade-60';
  return 'bg-grade-bad';
}

function generateTableHtml(boundaryType, params) {
  let html = '<table class="w-full border-collapse border border-gray-300 bg-white text-center table-fixed">';
  
  // Header
  html += '<thead><tr>';
  html += '<th class="p-2 border bg-gray-100 text-xs text-gray-500 font-bold sticky-col w-12 z-20">厚\\面</th>';
  for(const s of AREA_STEPS) {
    html += `<th class="p-1 border bg-gray-50 text-xs font-bold w-10">${s}</th>`;
  }
  html += '</tr></thead><tbody>';

  // Body
  for(const h of THICKNESS_STEPS) {
    html += `<tr><td class="p-1 border bg-gray-50 font-bold text-xs sticky-col bg-gray-50">${h}</td>`;
    for(const s of AREA_STEPS) {
      const grade = calculateCellGrade(h, s, boundaryType, params);
      const colorClass = getGradeColorClass(grade);
      const displayText = grade.replace('L-','').replace('以上','↑');
      html += `<td class="cell ${colorClass}" title="厚さ${h}mm / 面積${s}㎡ : ${grade}">${displayText}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function updateTables() {
  const params = {
    rho: parseFloat(document.getElementById('rho').value),
    E: parseFloat(document.getElementById('E10').value) * 1e10,
    H: parseFloat(document.getElementById('H_m').value), // 天井高
    T: parseFloat(document.getElementById('T_sec').value), // 残響時間
    fth: parseFloat(document.getElementById('f_theta').value)
  };

  document.getElementById('tableContainerObari').innerHTML = generateTableHtml('obari', params);
  document.getElementById('tableContainerNone').innerHTML = generateTableHtml('none', params);
  
  document.getElementById('resultArea').classList.remove('hidden');
}

window.switchTab = function(type) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  const btns = document.querySelectorAll('.tab-btn');
  if(type === 'obari') btns[0].classList.add('active');
  else btns[1].classList.add('active');

  document.getElementById(`tab-${type}`).classList.add('active');
};

document.getElementById('runBtn').addEventListener('click', updateTables);
updateTables(); 

</script>
</body>
</html>
