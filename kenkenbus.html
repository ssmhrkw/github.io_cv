<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="通勤バス" />
<meta name="theme-color" content="#f2f4f9" id="themeColorMeta" />
<title>つくば通勤バス</title>
<style>
  :root{
    --bg:#f2f4f9; --card:rgba(255,255,255,.88); --card-solid:#ffffff; --text:#10151f;
    --muted:#667085; --subtle:#8a93a3; --line:rgba(16,21,31,.10);
    --accent:#1677ff; --accent-weak:rgba(22,119,255,.12);
    --green:#13a05f; --orange:#ef8a00; --red:#e5484d;
    --track:#e9edf4; --kantetsu:#2563eb; --hokubu:#0891b2; --yoshinuma:#7c3aed;
    --material:rgba(255,255,255,.76);
    --shadow:0 1px 3px rgba(16,21,31,.05),0 10px 28px rgba(16,21,31,.06);
  }
  [data-theme="dark"]{
    --bg:#0b0e14; --card:rgba(22,27,36,.86); --card-solid:#161b24; --text:#eef2f8;
    --muted:#9aa6b6; --subtle:#6f7a8b; --line:rgba(238,242,248,.12);
    --accent:#5aa2ff; --accent-weak:rgba(90,162,255,.17);
    --green:#3ad28f; --orange:#ffb74d; --red:#ff6b70;
    --track:#222a36; --kantetsu:#6aa6ff; --hokubu:#2bc6e0; --yoshinuma:#a98bff;
    --material:rgba(22,27,36,.76);
    --shadow:0 1px 3px rgba(0,0,0,.4),0 12px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    font-variant-numeric:tabular-nums;-webkit-text-size-adjust:100%;}
  body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .app{width:min(100%,540px);margin:0 auto;padding:0 14px 40px;}

  .nav{
    position:sticky;top:0;z-index:30;
    padding:8px 0 10px;
    background:linear-gradient(to bottom,var(--bg) 42%,rgba(242,244,249,.76) 82%,transparent);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  }
  [data-theme="dark"] .nav{background:linear-gradient(to bottom,var(--bg) 42%,rgba(11,14,20,.76) 82%,transparent);}
  .title-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;margin-bottom:8px;}
  .title{font-size:17px;font-weight:850;text-align:center;letter-spacing:-.02em;padding:7px 0 0 40px;}
  .theme{display:flex;gap:4px;}
  .theme button{appearance:none;border:1px solid var(--line);background:var(--card-solid);color:var(--muted);
    width:30px;height:28px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;line-height:1;padding:0;}
  .theme button.active{color:var(--accent);background:var(--accent-weak);border-color:transparent;}

  .clockwrap{margin:2px 2px 10px;}
  .clock{font-size:46px;line-height:.96;font-weight:850;letter-spacing:-.045em;}
  .clock .sec{font-size:20px;font-weight:800;color:var(--muted);margin-left:4px;letter-spacing:-.02em;}
  .date{margin-top:4px;color:var(--muted);font-size:12.5px;font-weight:700;}

  .seg{display:grid;gap:4px;padding:4px;background:rgba(128,128,128,.10);border:1px solid var(--line);border-radius:14px;margin-top:8px;}
  .seg.dir{grid-template-columns:1fr 1fr;}
  .seg.dia{grid-template-columns:repeat(3,1fr);}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);font-weight:800;
    border-radius:10px;padding:9px 10px;font-size:13px;cursor:pointer;white-space:nowrap;line-height:1.1;}
  .seg button.active{background:var(--card-solid);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.10);}
  [data-theme="dark"] .seg button.active{box-shadow:0 2px 8px rgba(0,0,0,.42);}
  .note{margin:10px 4px 2px;color:var(--muted);font-size:11.5px;line-height:1.5;font-weight:600;}

  .stack{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .caption{margin:14px 4px 6px;color:var(--subtle);font-size:11.5px;font-weight:850;letter-spacing:.02em;}

  .card{border:1px solid var(--line);border-radius:22px;background:var(--material);box-shadow:var(--shadow);
    padding:14px;position:relative;overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  .rline{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .badge{font-size:11px;font-weight:850;color:#fff;border-radius:7px;padding:3px 7px;letter-spacing:.02em;flex:0 0 auto;}
  .b-kantetsu{background:var(--kantetsu);} .b-hokubu{background:var(--hokubu);} .b-yoshinuma{background:var(--yoshinuma);}
  .badge-link{text-decoration:none;}
  .station-link{color:var(--accent);text-decoration:none;font-weight:850;}

  .rlabel{font-size:17px;font-weight:850;letter-spacing:-.02em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .ended{font-size:15px;font-weight:800;color:var(--muted);padding:8px 2px;}

  .mid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
  .dep{min-width:0;}
  .dep .t{display:block;font-size:28px;font-weight:850;letter-spacing:-.05em;line-height:1;}
  .dep .u{font-size:12px;font-weight:800;color:var(--muted);margin-top:3px;}
  .center{text-align:center;min-width:82px;}
  .big{font-size:38px;line-height:.94;font-weight:900;letter-spacing:-.06em;}
  .big .min{font-size:15px;font-weight:850;margin-left:1px;letter-spacing:-.02em;}
  .big.soon{font-size:24px;letter-spacing:-.02em;}
  .clabel{margin-top:4px;font-size:11px;font-weight:800;color:var(--muted);}
  .arr{text-align:right;color:var(--text);min-width:0;}
  .arr .t{display:block;font-size:19px;font-weight:800;letter-spacing:-.03em;}
  .arr .u{font-size:11px;color:var(--muted);font-weight:800;margin-top:3px;}
  .bar{height:6px;border-radius:999px;background:var(--track);margin-top:12px;overflow:hidden;}
  .fill{height:100%;border-radius:999px;width:0;transition:width .35s linear;}
  .fill.ok{background:var(--green);} .fill.soon{background:var(--accent);}
  .fill.run{background:var(--orange);} .fill.risk{background:var(--red);}
  .status{margin-top:10px;font-size:13px;line-height:1.45;font-weight:700;}
  .status.ok{color:var(--green);} .status.soon{color:var(--accent);}
  .status.run{color:var(--orange);} .status.risk{color:var(--red);}
  .status.ended{color:var(--muted);}
  .uplist{border:1px solid var(--line);border-radius:16px;background:var(--material);overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  .up{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid var(--line);}
  .up:first-child{border-top:0;}
  .up .route-small{font-size:11px;color:var(--muted);font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .up .ut{font-size:17px;font-weight:850;letter-spacing:-.02em;}
  .up .um{font-size:14px;font-weight:800;text-align:right;}
  .up .ua{color:var(--subtle);font-size:12px;font-weight:700;text-align:right;margin-top:2px;}
  .empty{font-size:14px;font-weight:700;color:var(--muted);padding:14px;background:var(--material);border-radius:16px;border:1px solid var(--line);}

  .links-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
  .linkbtn{display:flex;align-items:center;justify-content:space-between;gap:8px;text-decoration:none;
    color:var(--text);background:var(--material);border:1px solid var(--line);border-radius:14px;
    padding:10px 12px;box-shadow:var(--shadow);font-size:14px;font-weight:750;}
  .linkbtn .arrow{font-size:12px;color:var(--muted);font-weight:900;}
  .foot{margin:18px 4px 0;color:var(--subtle);font-size:11px;line-height:1.6;font-weight:600;}

  @media(max-width:360px){
    .app{padding-left:10px;padding-right:10px;}
    .clock{font-size:42px;}
    .rlabel{font-size:15px;}
    .dep .t{font-size:25px;}
    .big{font-size:34px;}
    .arr .t{font-size:17px;}
    .links-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="nav">
    <div class="title-row">
      <div class="title">つくば通勤バス</div>
      <div class="theme" id="themePills">
        <button data-theme="auto" title="自動">A</button>
        <button data-theme="light" title="ライト">☀</button>
        <button data-theme="dark" title="ダーク">☾</button>
      </div>
    </div>
    <div class="clockwrap">
      <div class="clock"><span id="clockMain">--:--</span><span class="sec" id="clockSec">--</span></div>
      <div class="date" id="dateEl">--</div>
    </div>
    <div class="seg dir" id="dirSeg">
      <button data-dir="outbound">往路</button>
      <button data-dir="inbound">復路</button>
    </div>
    <div class="seg dia" id="diaSeg">
      <button data-dia="auto">自動</button>
      <button data-dia="weekday">平日</button>
      <button data-dia="weekend">土日祝</button>
    </div>
    <div class="note" id="noteEl"></div>
  </header>

  <main>
    <section class="stack" id="cards"></section>

    <section class="caption">このあとの便</section>
    <section id="upcoming"></section>

    <section class="caption">リンク</section>
    <nav class="links-grid" id="links"></nav>

    <footer class="foot">
      Swift版の BusRoute / BusSchedule / BusTimeCalculator / ContentView と同じ構成に寄せたHTML版です。<br>
      到着時刻は「着目安」。関鉄便の着時刻は所要時間目安で算出しています。
    </footer>
  </main>
</div>

  }
];

const HOLIDAYS = {
  "2026-01-01":"元日","2026-01-12":"成人の日","2026-02-11":"建国記念の日","2026-02-23":"天皇誕生日",
  "2026-03-20":"春分の日","2026-04-29":"昭和の日","2026-05-03":"憲法記念日","2026-05-04":"みどりの日",
  "2026-05-05":"こどもの日","2026-05-06":"振替休日","2026-07-20":"海の日","2026-08-11":"山の日",
  "2026-09-21":"敬老の日","2026-09-22":"国民の休日","2026-09-23":"秋分の日","2026-10-12":"スポーツの日",
  "2026-11-03":"文化の日","2026-11-23":"勤労感謝の日",
  "2027-01-01":"元日","2027-02-11":"建国記念の日","2027-02-23":"天皇誕生日",
  "2027-04-29":"昭和の日","2027-05-03":"憲法記念日","2027-05-04":"みどりの日","2027-05-05":"こどもの日"
};
const BADGE_TEXT = {kantetsu:"関鉄", hokubu:"北部", yoshinuma:"吉沼"};
const WD = ["日","月","火","水","木","金","土"];
const STORE_KEY = "kenken_bus_html_swift_like_v1";

const state = {
  direction: "outbound",
  scheduleKind: "auto",
  themeMode: "auto"
};

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    if(s.direction) state.direction = s.direction;
    if(s.scheduleKind) state.scheduleKind = s.scheduleKind;
    if(s.themeMode) state.themeMode = s.themeMode;
  }catch(e){}
}
function saveState(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}

function pad(n){ return n < 10 ? "0" + n : String(n); }
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function isWeekendOrHoliday(date){
  const day = date.getDay();
  return day === 0 || day === 6 || HOLIDAYS[ymd(date)] != null;
}
function effectiveScheduleKind(kind, date){
  if(kind === "weekday" || kind === "weekend") return kind;
  return isWeekendOrHoliday(date) ? "weekend" : "weekday";
}
function scheduleFor(route, kind, date){
  return route[effectiveScheduleKind(kind, date)] || [];
}
function normalizeTime(entry){
  return typeof entry === "string" ? { departure: entry, arrival: null, id: entry + "-" } : { departure: entry[0], arrival: entry[1], id: entry[0] + "-" + entry[1] };
}
function makeDate(hourMinute, baseDate){
  const parts = hourMinute.split(":").map(Number);
  const d = new Date(baseDate.getTime());
  d.setHours(parts[0], parts[1], 0, 0);
  return d;
}
function formatHourMinute(date){
  return pad(date.getHours()) + ":" + pad(date.getMinutes());
}
function resolvedArrivalText(time, departureDate, fallbackDurationMinutes){
  if(time && time.arrival) return time.arrival;
  const minutes = Number.isFinite(fallbackDurationMinutes) ? fallbackDurationMinutes : 20;
  return formatHourMinute(new Date(departureDate.getTime() + minutes * 60000));
}
function nextBus(route, now){
  const schedule = scheduleFor(route, state.scheduleKind, now);
  for(const raw of schedule){
    const time = normalizeTime(raw);
    const departureDate = makeDate(time.departure, now);
    if(departureDate > now){
      const minutesUntilDeparture = Math.ceil((departureDate.getTime() - now.getTime()) / 60000);
      const minutesUntilLeaving = minutesUntilDeparture - route.walkBufferMinutes;
      return {
        time,
        departureDate,
        minutesUntilDeparture,
        minutesUntilLeaving,
        arrivalText: resolvedArrivalText(time, departureDate, route.fallbackDurationMinutes)
      };
    }
  }
  return null;
}

function outboundStatus(minutesUntilLeaving){
  if(minutesUntilLeaving > 15) return ["ok", "まだ余裕があります。"];
  if(minutesUntilLeaving > 10) return ["soon", "そろそろ出る時間です。"];
  if(minutesUntilLeaving >= 5) return ["run", "駅からなら走る時間です。"];
  return ["risk", "駅からだとかなり厳しいです。次便も確認してください。"];
}
function inboundStatus(minutesUntilDeparture){
  if(minutesUntilDeparture > 15) return ["ok", "まだ余裕があります。"];
  if(minutesUntilDeparture > 10) return ["soon", "そろそろバス停へ。"];
  if(minutesUntilDeparture >= 5) return ["run", "発車が近づいています。"];
  return ["risk", "まもなく発車します。次便も確認してください。"];
}
function ohoReturnStatus(minutesUntilDeparture){
  if(minutesUntilDeparture > 25) return ["ok", "まだ余裕があります。建築研究所から大穂へ歩く場合も間に合います。"];
  if(minutesUntilDeparture > 20) return ["ok", "建築研究所から大穂へ歩くならそろそろ出発。教職員支援機構からは余裕あり。"];
  if(minutesUntilDeparture > 15) return ["soon", "建築研究所からは今すぐ出てください。教職員支援機構からはまだ間に合います。"];
  if(minutesUntilDeparture > 10) return ["run", "教職員支援機構からならそろそろ出発。建築研究所からは間に合いにくいです。"];
  if(minutesUntilDeparture > 5) return ["risk", "教職員支援機構からでもかなり急ぎです。建築研究所からは次便前提です。"];
  return ["risk", "もう厳しいです。大穂窓口センターに着いていないなら次便を見てください。"];
}
function makeCardViewModel(route, now){
  const bus = nextBus(route, now);
  if(!bus){
    return {
      id: route.id,
      route,
      nextBus: null,
      urgencyLevel: "ended",
      statusText: "本日の運行は終了しました。",
      heroMinutes: null,
      heroLabel: route.direction === "outbound" ? "駅を出るまで" : "発車まで"
    };
  }
  let heroMinutes, heroLabel, status;
  if(route.direction === "outbound"){
    heroMinutes = bus.minutesUntilLeaving;
    heroLabel = "駅を出るまで";
    status = outboundStatus(bus.minutesUntilLeaving);
  }else{
    heroMinutes = bus.minutesUntilDeparture;
    heroLabel = "発車まで";
    status = route.useOhoReturnWarning ? ohoReturnStatus(bus.minutesUntilDeparture) : inboundStatus(bus.minutesUntilDeparture);
  }
  return {
    id: route.id,
    route,
    nextBus: bus,
    urgencyLevel: status[0],
    statusText: status[1],
    heroMinutes,
    heroLabel
  };
}
function routesFor(direction){
  return ROUTES.filter(r => r.direction === direction);
}
function makeCardViewModels(direction, now){
  return routesFor(direction).map(route => makeCardViewModel(route, now));
}
function upcomingBuses(route, now, limit = 6, skipFirst = true){
  const schedule = scheduleFor(route, state.scheduleKind, now);
  const upcoming = [];
  for(const raw of schedule){
    const time = normalizeTime(raw);
    const departureDate = makeDate(time.departure, now);
    if(departureDate <= now) continue;
    upcoming.push({
      id: route.id + "-" + time.id,
      route,
      time,
      departureDate,
      minutesUntilDeparture: Math.ceil((departureDate.getTime() - now.getTime()) / 60000),
      arrivalText: resolvedArrivalText(time, departureDate, route.fallbackDurationMinutes)
    });
    if(upcoming.length >= limit + (skipFirst ? 1 : 0)) break;
  }
  return skipFirst && upcoming.length ? upcoming.slice(1, 1 + limit) : upcoming.slice(0, limit);
}
function mergedUpcomingBuses(direction, now, limit = 7){
  const merged = routesFor(direction).flatMap(route => upcomingBuses(route, now, limit, true));
  return merged.sort((a,b) => a.departureDate - b.departureDate).slice(0, limit);
}
function noteText(now){
  const holiday = isWeekendOrHoliday(now);
  let base;
  if(state.scheduleKind === "auto") base = "自動判定：" + (holiday ? "土日祝" : "平日") + "ダイヤを表示";
  else if(state.scheduleKind === "weekday") base = "平日ダイヤを表示";
  else base = "土日祝ダイヤを表示";
  const includesKantetsu = routesFor(state.direction).some(r => r.badge === "kantetsu");
  const usesWeekend = state.scheduleKind === "weekend" || (state.scheduleKind === "auto" && holiday);
  if(includesKantetsu && usesWeekend) return base + " ・ 関鉄は土日祝が大幅減便。最新は関鉄サイトで確認。";
  return base;
}

function progressValue(card){
  if(card.heroMinutes == null) return 0;
  return Math.min(Math.max(card.heroMinutes / 30, 0), 1);
}
function badgeHTML(routeOrBadge){
  const badge = typeof routeOrBadge === "string" ? routeOrBadge : routeOrBadge.badge;
  const label = BADGE_TEXT[badge];
  const url = typeof routeOrBadge === "string" ? null : routeOrBadge.realtimeUrl;
  if((badge === "hokubu" || badge === "yoshinuma") && url){
    return '<a class="badge b-' + badge + ' badge-link" href="' + url + '" target="_blank" rel="noopener">' + label + '</a>';
  }
  return '<span class="badge b-' + badge + '">' + label + '</span>';
}

function stationName(route){
  if(route.trainArrival === "tsukuba") return "つくば駅";
  if(route.trainArrival === "kenkyu") return "研究学園駅";
  return null;
}
function stationURL(route){
  if(route.trainArrival === "tsukuba") return txURL("9438", new Date());
  if(route.trainArrival === "kenkyu") return txURL("9441", new Date());
  return null;
}
function arrivalSubHTML(route){
  const name = stationName(route);
  const url = stationURL(route);
  if(name && url){
    return '<div class="u"><a class="station-link" href="' + url + '" target="_blank" rel="noopener">' + name + '</a> 着目安</div>';
  }
  return '<div class="u">着目安</div>';
}


function cardHTML(card){
  const route = card.route;
  const head = '<div class="rline">' + badgeHTML(route) + '<span class="rlabel">' + route.label + '</span></div>';
  if(!card.nextBus){
    return '<article class="card">' + head + '<div class="ended">' + card.statusText + '</div>' + '</article>';
  }
  const hero = card.heroMinutes > 0
    ? '<div class="big">' + card.heroMinutes + '<span class="min">分</span></div>'
    : '<div class="big soon">まもなく</div>';
  const pct = (progressValue(card) * 100).toFixed(2);
  return '<article class="card">' + head +
    '<div class="mid">' +
      '<div class="dep"><span class="t">' + card.nextBus.time.departure + '</span><div class="u">発</div></div>' +
      '<div class="center">' + hero + '<div class="clabel">' + card.heroLabel + '</div></div>' +
      '<div class="arr"><span class="t">' + card.nextBus.arrivalText + '</span>' + arrivalSubHTML(route) + '</div>' +
    '</div>' +
    '<div class="bar"><div class="fill ' + card.urgencyLevel + '" style="width:' + pct + '%"></div></div>' +
    '<div class="status ' + card.urgencyLevel + '">' + card.statusText + '</div>' +
  '</article>';
}
function upcomingRowHTML(item){
  return '<div class="up">' +
    badgeHTML(item.route) +
    '<div><div class="route-small">' + item.route.label + '</div><div class="ut">' + item.time.departure + '</div></div>' +
    '<div><div class="um">' + item.minutesUntilDeparture + '分後</div><div class="ua">着 ' + item.arrivalText + '目安</div></div>' +
  '</div>';
}
function txTarget(now){
  if(state.scheduleKind === "weekday") return "weekday";
  if(state.scheduleKind === "weekend") return "holiday";
  return isWeekendOrHoliday(now) ? "holiday" : "weekday";
}
function txURL(stationCode, now){
  return "https://transfer-train.navitime.biz/tx/timetable?station=" + stationCode + "&line=1&target=" + txTarget(now) + "&direction=0";
}
function linkHTML(title, url){
  if(!url) return "";
  return '<a class="linkbtn" href="' + url + '" target="_blank" rel="noopener"><span>' + title + '</span><span class="arrow">↗</span></a>';
}
function renderLinks(now){
  const routes = routesFor(state.direction);
  const links = [];
  if(routes.some(r => r.badge === "kantetsu")){
    links.push(["関鉄接近", "https://navi.kanto-tetsudo.com/"]);
  }
  if(state.direction === "inbound"){
    links.push(["つくば駅 TX", txURL("9438", now)]);
    links.push(["研究学園駅 TX", txURL("9441", now)]);
  }
  document.getElementById("links").innerHTML = links.map(x => linkHTML(x[0], x[1])).join("");
}
function renderCards(now){
  document.getElementById("cards").innerHTML = makeCardViewModels(state.direction, now).map(cardHTML).join("");
  const upcoming = mergedUpcomingBuses(state.direction, now, 7);
  document.getElementById("upcoming").innerHTML = upcoming.length
    ? '<div class="uplist">' + upcoming.map(upcomingRowHTML).join("") + '</div>'
    : '<div class="empty">このあとの便はありません。</div>';
}
function renderClock(now){
  document.getElementById("clockMain").textContent = pad(now.getHours()) + ":" + pad(now.getMinutes());
  document.getElementById("clockSec").textContent = pad(now.getSeconds());
  const holiday = HOLIDAYS[ymd(now)];
  document.getElementById("dateEl").textContent =
    (now.getMonth()+1) + "/" + now.getDate() + "（" + WD[now.getDay()] + "）" + (holiday ? " " + holiday : "");
}
function renderControls(){
  document.querySelectorAll("#dirSeg button").forEach(btn => btn.classList.toggle("active", btn.dataset.dir === state.direction));
  document.querySelectorAll("#diaSeg button").forEach(btn => btn.classList.toggle("active", btn.dataset.dia === state.scheduleKind));
  document.querySelectorAll("#themePills button").forEach(btn => btn.classList.toggle("active", btn.dataset.theme === state.themeMode));
}
function renderNote(now){
  document.getElementById("noteEl").textContent = noteText(now);
}
function renderAll(){
  const now = new Date();
  renderClock(now);
  renderControls();
  renderNote(now);
  renderCards(now);
  renderLinks(now);
}

const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : {matches:false, addEventListener:null};
function resolvedTheme(){
  return state.themeMode === "auto" ? (mq.matches ? "dark" : "light") : state.themeMode;
}
function applyTheme(){
  const theme = resolvedTheme();
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("themeColorMeta").setAttribute("content", theme === "dark" ? "#0b0e14" : "#f2f4f9");
}

document.getElementById("dirSeg").addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  state.direction = btn.dataset.dir;
  saveState();
  renderAll();
});
document.getElementById("diaSeg").addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  state.scheduleKind = btn.dataset.dia;
  saveState();
  renderAll();
});
document.getElementById("themePills").addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  state.themeMode = btn.dataset.theme;
  saveState();
  applyTheme();
  renderControls();
});
if(mq.addEventListener){
  mq.addEventListener("change", () => {
    if(state.themeMode === "auto"){
      applyTheme();
      renderControls();
    }
  });
}

loadState();
applyTheme();
renderAll();
setInterval(renderAll, 1000);
</script>
</body>
</html>
