  :root{

    --accent:#1677ff; --accent-weak:rgba(22,119,255,.12);

  }

  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);

    padding:8px 0 10px;

    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  }

  .title{font-size:17px;font-weight:850;text-align:center;letter-spacing:-.02em;padding:7px 0 0 40px;}
  .theme{display:flex;gap:4px;}
  .theme button{appearance:none;border:1px solid var(--line);background:var(--card-solid);color:var(--muted);

  .theme button.active{color:var(--accent);background:var(--accent-weak);border-color:transparent;}

  .clockwrap{margin:2px 2px 10px;}
  .clock{font-size:46px;line-height:.96;font-weight:850;letter-spacing:-.045em;}
  .clock .sec{font-size:20px;font-weight:800;color:var(--muted);margin-left:4px;letter-spacing:-.02em;}
  .date{margin-top:4px;color:var(--muted);font-size:12.5px;font-weight:700;}

  .seg{display:grid;gap:4px;padding:4px;background:rgba(128,128,128,.10);border:1px solid var(--line);border-radius:14px;margin-top:8px;}
  .seg.dir{grid-template-columns:1fr 1fr;}
  .seg.dia{grid-template-columns:repeat(3,1fr);}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);font-weight:800;
    border-radius:10px;padding:9px 10px;font-size:13px;cursor:pointer;white-space:nowrap;line-height:1.1;}
  .seg button.active{background:var(--card-solid);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.10);}
  [data-theme="dark"] .seg button.active{box-shadow:0 2px 8px rgba(0,0,0,.42);}
  .note{margin:10px 4px 2px;color:var(--muted);font-size:11.5px;line-height:1.5;font-weight:600;}

  .stack{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .caption{margin:14px 4px 6px;color:var(--subtle);font-size:11.5px;font-weight:850;letter-spacing:.02em;}

  .card{border:1px solid var(--line);border-radius:22px;background:var(--material);box-shadow:var(--shadow);
    padding:14px;position:relative;overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  .rline{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .badge{font-size:11px;font-weight:850;color:#fff;border-radius:7px;padding:3px 7px;letter-spacing:.02em;flex:0 0 auto;}
  .b-otaka{background:var(--otaka);} .b-minami{background:var(--minami);}
  .station-link{color:var(--accent);text-decoration:none;font-weight:850;}

  .rlabel{font-size:17px;font-weight:850;letter-spacing:-.02em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .ended{font-size:15px;font-weight:800;color:var(--muted);padding:8px 2px;}

  .mid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
  .dep{min-width:0;}
  .dep .t{display:block;font-size:28px;font-weight:850;letter-spacing:-.05em;line-height:1;}
  .dep .u{font-size:12px;font-weight:800;color:var(--muted);margin-top:3px;}
  .center{text-align:center;min-width:82px;}
  .big{font-size:38px;line-height:.94;font-weight:900;letter-spacing:-.06em;}

  .big.soon{font-size:24px;letter-spacing:-.02em;}
  .clabel{margin-top:4px;font-size:11px;font-weight:800;color:var(--muted);}
  .arr{text-align:right;color:var(--text);min-width:0;}
  .arr .t{display:block;font-size:19px;font-weight:800;letter-spacing:-.03em;}
  .arr .u{font-size:11px;color:var(--muted);font-weight:800;margin-top:3px;}
  .bar{height:6px;border-radius:999px;background:var(--track);margin-top:12px;overflow:hidden;}
  .fill{height:100%;border-radius:999px;width:0;transition:width .35s linear;}
  .fill.ok{background:var(--green);} .fill.soon{background:var(--accent);}
  .fill.run{background:var(--orange);} .fill.risk{background:var(--red);}

  .empty{font-size:14px;font-weight:700;color:var(--muted);padding:14px;background:var(--material);border-radius:16px;border:1px solid var(--line);}

  .linkbtn{display:flex;align-items:center;justify-content:space-between;gap:8px;text-decoration:none;

  .foot{margin:18px 4px 0;color:var(--subtle);font-size:11px;line-height:1.6;font-weight:600;}

</div>

const STORE_KEY = "home_bus_html_v1";

const state = {
  direction: "outbound",
  scheduleKind: "auto",
  themeMode: "auto"
};

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    if(s.direction) state.direction = s.direction;
    if(s.scheduleKind) state.scheduleKind = s.scheduleKind;
    if(s.themeMode) state.themeMode = s.themeMode;
  }catch(e){}
}
function saveState(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}

function pad(n){ return n < 10 ? "0" + n : String(n); }
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function isWeekendOrHoliday(date){
  const day = date.getDay();
  return day === 0 || day === 6 || HOLIDAYS[ymd(date)] != null;
}
function effectiveScheduleKind(kind, date){
  if(kind === "weekday" || kind === "weekend") return kind;
  return isWeekendOrHoliday(date) ? "weekend" : "weekday";
}
function scheduleFor(route, kind, date){
  return route[effectiveScheduleKind(kind, date)] || [];
}
function makeDate(hourMinute, baseDate){
  const parts = hourMinute.split(":").map(Number);
  const d = new Date(baseDate.getTime());
  d.setHours(parts[0], parts[1], 0, 0);
  return d;
}
function formatHourMinute(date){
  return pad(date.getHours()) + ":" + pad(date.getMinutes());
}
function arrivalText(departureDate, fallbackDurationMinutes){
  const minutes = Number.isFinite(fallbackDurationMinutes) ? fallbackDurationMinutes : 20;
  return formatHourMinute(new Date(departureDate.getTime() + minutes * 60000));
}
function nextBus(route, now){
  const schedule = scheduleFor(route, state.scheduleKind, now);
  for(const dep of schedule){
    const departureDate = makeDate(dep, now);
    if(departureDate > now){
      const minutesUntilDeparture = Math.ceil((departureDate.getTime() - now.getTime()) / 60000);
      const minutesUntilLeaving = minutesUntilDeparture - route.walkBufferMinutes;
      return {
        departure: dep,
        departureDate,
        minutesUntilDeparture,
        minutesUntilLeaving,
        arrivalText: arrivalText(departureDate, route.fallbackDurationMinutes)
      };
    }
  }
  return null;
}

function outboundStatus(minutesUntilLeaving){
  if(minutesUntilLeaving > 15) return ["ok", "まだ余裕があります。"];
  if(minutesUntilLeaving > 10) return ["soon", "そろそろ家を出る準備を。"];
  if(minutesUntilLeaving >= 5) return ["run", "そろそろ家を出ましょう。"];
  if(minutesUntilLeaving >= 0) return ["risk", "今すぐ家を出てください。"];
  return ["risk", "出発が近いです。間に合わなければ次の便を確認してください。"];
}
function inboundStatus(minutesUntilDeparture){
  if(minutesUntilDeparture > 15) return ["ok", "まだ余裕があります。"];
  if(minutesUntilDeparture > 10) return ["soon", "そろそろバス停へ。"];
  if(minutesUntilDeparture >= 5) return ["run", "発車が近づいています。"];
  return ["risk", "まもなく発車します。次の便も確認してください。"];
}
function makeCardViewModel(route, now){
  const bus = nextBus(route, now);
  if(!bus){
    return {
      id: route.id, route, nextBus: null,
      urgencyLevel: "ended",
      statusText: "本日の運行は終了しました。",
      heroMinutes: null,
      heroLabel: route.direction === "outbound" ? "家を出るまで" : "発車まで"
    };
  }
  let heroMinutes, heroLabel, status;
  if(route.direction === "outbound"){
    heroMinutes = bus.minutesUntilLeaving;
    heroLabel = "家を出るまで";
    status = outboundStatus(bus.minutesUntilLeaving);
  }else{
    heroMinutes = bus.minutesUntilDeparture;
    heroLabel = "発車まで";
    status = inboundStatus(bus.minutesUntilDeparture);
  }
  return { id: route.id, route, nextBus: bus, urgencyLevel: status[0], statusText: status[1], heroMinutes, heroLabel };
}
function routesFor(direction){
  return ROUTES.filter(r => r.direction === direction);
}
function makeCardViewModels(direction, now){
  return routesFor(direction).map(route => makeCardViewModel(route, now));
}
function upcomingBuses(route, now, limit, skipFirst){
  const schedule = scheduleFor(route, state.scheduleKind, now);
  const upcoming = [];
  for(const dep of schedule){
    const departureDate = makeDate(dep, now);
    if(departureDate <= now) continue;
    upcoming.push({
      id: route.id + "-" + dep,
      route, departure: dep, departureDate,
      minutesUntilDeparture: Math.ceil((departureDate.getTime() - now.getTime()) / 60000),
      arrivalText: arrivalText(departureDate, route.fallbackDurationMinutes)
    });
    if(upcoming.length >= limit + (skipFirst ? 1 : 0)) break;
  }
  return skipFirst && upcoming.length ? upcoming.slice(1, 1 + limit) : upcoming.slice(0, limit);
}
function mergedUpcomingBuses(direction, now, limit){
  const merged = routesFor(direction).flatMap(route => upcomingBuses(route, now, limit, true));
  return merged.sort((a,b) => a.departureDate - b.departureDate).slice(0, limit);
}
function noteText(now){
  const holiday = isWeekendOrHoliday(now);
  let base;
  if(state.scheduleKind === "auto") base = "自動判定：" + (holiday ? "土日祝" : "平日") + "ダイヤを表示";
  else if(state.scheduleKind === "weekday") base = "平日ダイヤを表示";
  else base = "土日祝ダイヤを表示";
  if(state.direction === "outbound") return base + " ・ 駅名タップでTX（つくば方面）時刻表へ。";
  return base + " ・ 加二号公園前で下車する便を表示。";
}

function progressValue(card){
  if(card.heroMinutes == null) return 0;
  return Math.min(Math.max(card.heroMinutes / 30, 0), 1);
}
function badgeHTML(route){
  return '<span class="badge b-' + route.badge + '">' + BADGE_TEXT[route.badge] + '</span>';
}
function txTarget(){
  if(state.scheduleKind === "weekday") return "weekday";
  if(state.scheduleKind === "weekend") return "holiday";
  return isWeekendOrHoliday(new Date()) ? "holiday" : "weekday";
}
function txURL(stationKey){
  return "https://transfer-train.navitime.biz/tx/timetable?station=" + TX_STATION[stationKey] +
    "&line=1&target=" + txTarget() + "&direction=" + TX_DIRECTION_TO_WORK;
}
function arrivalSubHTML(route){
  // 家→駅：到着駅名をTX時刻表（つくば方面）へのリンクに。駅→家：加二号公園前 着目安。
  if(route.direction === "outbound"){
    return '<div class="u"><a class="station-link" href="' + txURL(route.station) +
      '" target="_blank" rel="noopener">' + TX_STATION_LABEL[route.station] + '</a> 着目安</div>';
  }
  return '<div class="u">加二号公園前 着目安</div>';
}

function cardHTML(card){
  const route = card.route;
  const head = '<div class="rline">' + badgeHTML(route) + '<span class="rlabel">' + route.label + '</span></div>';
  if(!card.nextBus){
    return '<article class="card">' + head + '<div class="ended">' + card.statusText + '</div></article>';
  }
  const hero = card.heroMinutes > 0
    ? '<div class="big">' + card.heroMinutes + '<span class="min">分</span></div>'
    : '<div class="big soon">まもなく</div>';
  const pct = (progressValue(card) * 100).toFixed(2);
  return '<article class="card">' + head +
    '<div class="mid">' +
      '<div class="dep"><span class="t">' + card.nextBus.departure + '</span><div class="u">発</div></div>' +
      '<div class="center">' + hero + '<div class="clabel">' + card.heroLabel + '</div></div>' +
      '<div class="arr"><span class="t">' + card.nextBus.arrivalText + '</span>' + arrivalSubHTML(route) + '</div>' +
    '</div>' +
    '<div class="bar"><div class="fill ' + card.urgencyLevel + '" style="width:' + pct + '%"></div></div>' +
    '<div class="status ' + card.urgencyLevel + '">' + card.statusText + '</div>' +
  '</article>';
}
function upcomingRowHTML(item){
  return '<div class="up">' +
    badgeHTML(item.route) +
    '<div><div class="route-small">' + item.route.label + '</div><div class="ut">' + item.departure + '</div></div>' +
    '<div><div class="um">' + item.minutesUntilDeparture + '分後</div><div class="ua">着 ' + item.arrivalText + '目安</div></div>' +
  '</div>';
}
function linkHTML(title, url){
  return '<a class="linkbtn" href="' + url + '" target="_blank" rel="noopener"><span>' + title + '</span><span class="arrow">↗</span></a>';
}
function renderLinks(){
  const wrap = document.getElementById("linksWrap");
  const links = [];
  if(state.direction === "outbound"){
    links.push(["流山おおたかの森 TX（つくば方面）", txURL("otaka")]);
    links.push(["南流山 TX（つくば方面）", txURL("minami")]);
  }
  if(links.length === 0){
    wrap.style.display = "none";
    document.getElementById("links").innerHTML = "";
    return;
  }
  wrap.style.display = "";
  document.getElementById("links").innerHTML = links.map(x => linkHTML(x[0], x[1])).join("");
}
function renderCards(now){
  document.getElementById("cards").innerHTML = makeCardViewModels(state.direction, now).map(cardHTML).join("");
  const upcoming = mergedUpcomingBuses(state.direction, now, 7);
  document.getElementById("upcoming").innerHTML = upcoming.length
    ? '<div class="uplist">' + upcoming.map(upcomingRowHTML).join("") + '</div>'
    : '<div class="empty">このあとの便はありません。</div>';
}
function renderClock(now){
  document.getElementById("clockMain").textContent = pad(now.getHours()) + ":" + pad(now.getMinutes());
  document.getElementById("clockSec").textContent = pad(now.getSeconds());
  const holiday = HOLIDAYS[ymd(now)];
  document.getElementById("dateEl").textContent =
    (now.getMonth()+1) + "/" + now.getDate() + "（" + WD[now.getDay()] + "）" + (holiday ? " " + holiday : "");
}
function renderControls(){
  document.querySelectorAll("#dirSeg button").forEach(btn => btn.classList.toggle("active", btn.dataset.dir === state.direction));
  document.querySelectorAll("#diaSeg button").forEach(btn => btn.classList.toggle("active", btn.dataset.dia === state.scheduleKind));
  document.querySelectorAll("#themePills button").forEach(btn => btn.classList.toggle("active", btn.dataset.theme === state.themeMode));
}
function renderNote(now){
  document.getElementById("noteEl").textContent = noteText(now);
}
function renderAll(){
  const now = new Date();
  renderClock(now);
  renderControls();
  renderNote(now);
  renderCards(now);
  renderLinks();
}

const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : {matches:false, addEventListener:null};
function resolvedTheme(){
  return state.themeMode === "auto" ? (mq.matches ? "dark" : "light") : state.themeMode;
}
function applyTheme(){
  const theme = resolvedTheme();
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("themeColorMeta").setAttribute("content", theme === "dark" ? "#0b0e14" : "#f2f4f9");
}

document.getElementById("dirSeg").addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  state.direction = btn.dataset.dir;
  saveState();
  renderAll();
});
document.getElementById("diaSeg").addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  state.scheduleKind = btn.dataset.dia;
  saveState();
  renderAll();
});
document.getElementById("themePills").addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  state.themeMode = btn.dataset.theme;
  saveState();
  applyTheme();
  renderControls();
});
if(mq.addEventListener){
  mq.addEventListener("change", () => {
    if(state.themeMode === "auto"){ applyTheme(); renderControls(); }
  });
}

loadState();
applyTheme();
renderAll();
setInterval(renderAll, 1000);
</script>
</body>
</html>
